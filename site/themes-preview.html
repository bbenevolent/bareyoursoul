<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Theme Preview — Bare Your Soul</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: #f0f0f0; color: #333; line-height: 1.6; }
    .page-header { text-align: center; padding: 2rem 1rem; }
    .page-header h1 { font-size: 1.8rem; }
    .page-header p { color: #666; margin-top: 0.25rem; }
    .themes { max-width: 1200px; margin: 0 auto; padding: 0 1rem 3rem; display: grid; gap: 2rem; }
    .theme-label { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.5rem; text-align: center; }
    .theme-frame { border-radius: 12px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.12); }
    .theme-frame iframe { width: 100%; height: 700px; border: none; }
  </style>
</head>
<body>
  <div class="page-header">
    <h1>🪞 Theme Preview</h1>
    <p>Pick a direction for bareyoursoul.ai</p>
  </div>
  <div class="themes">
    <div>
      <div class="theme-label">1. Dark (current)</div>
      <div class="theme-frame"><iframe src="/front-page/dark.html"></iframe></div>
    </div>
    <div>
      <div class="theme-label">2. Mirror / Glass</div>
      <div class="theme-frame"><iframe src="/front-page/mirror.html"></iframe></div>
    </div>
    <div>
      <div class="theme-label">3. Parchment</div>
      <div class="theme-frame"><iframe src="/front-page/parchment.html"></iframe></div>
    </div>
    <div>
      <div class="theme-label">4. Ethereal</div>
      <div class="theme-frame"><iframe src="/front-page/ethereal.html"></iframe></div>
    </div>
  </div>
</body>
</html>
